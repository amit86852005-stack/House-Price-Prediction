<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🏠 House Price Prediction</h1>

<form action="/predict" method="POST">

<label>Overall Quality (1-10)</label>
<input type="number" name="overall" min="1" max="10" value="{{ overall }}" required>

<label>Living Area (sq ft)</label>
<input type="number" name="area" value="{{ area }}" required>

<label>Garage Capacity (Cars)</label>
<input type="number" name="garage" value="{{ garage }}" required>

<label>Basement Area (sq ft)</label>
<input type="number" name="basement" value="{{ basement }}" required>

<label>Year Built</label>
<input type="number" name="year" value="{{ year }}" required>

<button type="submit">Predict House Price</button>

</form>

{% if prediction %}
<div class="result">
    {{ prediction }}
</div>
{% endif %}

</div>

</body>

</html>
